<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>手机耗材管理系统</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Microsoft YaHei", sans-serif;
      }

      body {
        background-color: #f4f7fc;
        padding: 15px;
      }

      .container {
        max-width: 900px;
        margin: 0 auto;
        background: #fff;
        padding: 20px;
        border-radius: 12px;
        box-shadow: 0 2px 15px rgba(0, 0, 0, 0.08);
      }

      .title {
        text-align: center;
        color: #333;
        margin-bottom: 20px;
        font-size: 22px;
      }

      .tab-group {
        display: flex;
        gap: 10px;
        margin-bottom: 20px;
        flex-wrap: wrap;
      }

      .tab {
        padding: 8px 16px;
        border: none;
        background: #eee;
        border-radius: 6px;
        cursor: pointer;
      }

      .tab.active {
        background: #409eff;
        color: white;
      }

      .form {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-bottom: 20px;
      }

      input,
      select {
        flex: 1;
        min-width: 140px;
        padding: 10px 12px;
        border: 1px solid #ddd;
        border-radius: 6px;
      }

      button {
        padding: 10px 18px;
        background: #409eff;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
      }

      .btn-danger {
        background: #f56c6c;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 10px;
      }

      th,
      td {
        padding: 10px;
        text-align: center;
        border-bottom: 1px solid #eee;
      }

      th {
        background: #fafafa;
        color: #666;
      }

      .page {
        display: none;
      }

      .page.show {
        display: block;
      }

      .stats {
        padding: 10px;
        background: #f8f9fa;
        border-radius: 8px;
        margin-bottom: 15px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h2 class="title">📱 手机耗材管理系统</h2>

      <!-- 选项卡 -->
      <div class="tab-group">
        <button class="tab active" onclick="showPage('stock')">库存列表</button>
        <button class="tab" onclick="showPage('in')">耗材入库</button>
        <button class="tab" onclick="showPage('out')">耗材出库</button>
        <button class="tab" onclick="showPage('stats')">数据统计</button>
      </div>

      <!-- 库存页面 -->
      <div id="stock" class="page show">
        <div class="stats">当前库存：<span id="totalStock">0</span> 种耗材</div>
        <table>
          <thead>
            <tr>
              <th>耗材名称</th>
              <th>型号</th>
              <th>库存数量</th>
              <th>单价</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="stockList"></tbody>
        </table>
      </div>

      <!-- 入库页面 -->
      <div id="in" class="page">
        <div class="form">
          <input id="inName" placeholder="耗材名称（屏幕/电池/壳/膜等）" />
          <input id="inModel" placeholder="型号（如iPhone 15）" />
          <input id="inNum" placeholder="入库数量" type="number" />
          <input id="inPrice" placeholder="单价" type="number" />
          <button onclick="inStock()">确认入库</button>
        </div>
      </div>

      <!-- 出库页面 -->
      <div id="out" class="page">
        <div class="form">
          <select id="outSelect"></select>
          <input id="outNum" placeholder="出库数量" type="number" />
          <button onclick="outStock()">确认出库</button>
        </div>
      </div>

      <!-- 统计页面 -->
      <div id="stats" class="page">
        <div class="stats">
          <p>耗材总数：<span id="sTotal">0</span></p>
          <p>库存总数量：<span id="sCount">0</span></p>
          <p>库存总金额：<span id="sMoney">0</span> 元</p>
        </div>
      </div>
    </div>

    <script>
      // 读取本地数据
      let goods = JSON.parse(localStorage.getItem("phoneGoods")) || [];

      // 切换页面
      function showPage(id) {
        document
          .querySelectorAll(".page")
          .forEach((p) => p.classList.remove("show"));
        document
          .querySelectorAll(".tab")
          .forEach((t) => t.classList.remove("active"));
        document.getElementById(id).classList.add("show");
        event.target.classList.add("active");
        if (id === "out") renderOutSelect();
      }

      // 入库
      function inStock() {
        let name = document.getElementById("inName").value.trim();
        let model = document.getElementById("inModel").value.trim();
        let num = Number(document.getElementById("inNum").value);
        let price = Number(document.getElementById("inPrice").value);

        if (!name || !model || !num || !price) {
          alert("请填写完整信息");
          return;
        }

        let has = goods.find((i) => i.name === name && i.model === model);
        if (has) {
          has.num += num;
        } else {
          goods.push({ name, model, num, price });
        }

        save();
        alert("入库成功");
        renderStock();
        document.getElementById("inName").value = "";
        document.getElementById("inModel").value = "";
        document.getElementById("inNum").value = "";
        document.getElementById("inPrice").value = "";
      }

      // 渲染出库选择框
      function renderOutSelect() {
        let sel = document.getElementById("outSelect");
        sel.innerHTML = "";
        goods.forEach((g, i) => {
          let opt = document.createElement("option");
          opt.value = i;
          opt.innerText = `${g.name} ${g.model}（库存：${g.num}）`;
          sel.appendChild(opt);
        });
      }

      // 出库
      function outStock() {
        let idx = document.getElementById("outSelect").value;
        let num = Number(document.getElementById("outNum").value);
        if (!num || num <= 0) {
          alert("请输入有效出库数量");
          return;
        }
        if (goods[idx].num < num) {
          alert("库存不足！");
          return;
        }
        goods[idx].num -= num;
        if (goods[idx].num === 0) goods.splice(idx, 1);
        save();
        alert("出库成功");
        document.getElementById("outNum").value = "";
        renderStock();
      }

      // 渲染库存
      function renderStock() {
        let list = document.getElementById("stockList");
        list.innerHTML = "";
        goods.forEach((g) => {
          let tr = document.createElement("tr");
          tr.innerHTML = `
                <td>${g.name}</td>
                <td>${g.model}</td>
                <td>${g.num}</td>
                <td>${g.price}</td>
                <td><button class='btn-danger' onclick="del('${g.name}','${g.model}')">删除</button></td>
            `;
          list.appendChild(tr);
        });
        document.getElementById("totalStock").innerText = goods.length;
        renderStats();
      }

      // 删除耗材
      function del(name, model) {
        if (!confirm("确定删除该耗材？")) return;
        goods = goods.filter((i) => !(i.name === name && i.model === model));
        save();
        renderStock();
      }

      // 统计
      function renderStats() {
        let total = goods.length;
        let count = 0;
        let money = 0;
        goods.forEach((g) => {
          count += g.num;
          money += g.num * g.price;
        });
        document.getElementById("sTotal").innerText = total;
        document.getElementById("sCount").innerText = count;
        document.getElementById("sMoney").innerText = money.toFixed(2);
      }

      // 保存到本地
      function save() {
        localStorage.setItem("phoneGoods", JSON.stringify(goods));
      }

      // 初始化
      renderStock();
    </script>
  </body>
</html>
